<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PASSWORD - Jogo Estilo Termo</title>
    <!-- Carrega o Tailwind CSS para os estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega os ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Estilos adicionais para esconder a barra de scroll e ajustar cursores */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .hidden-input {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: text;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-mono selection:bg-emerald-500/30">

    <div id="game-container" class="min-h-screen flex flex-col items-center py-6 px-4">
        
        <!-- Cabeçalho -->
        <header class="flex items-center justify-center gap-3 mb-6 w-full max-w-lg border-b border-slate-800 pb-4">
            <div id="icon-lock"><i data-lucide="lock" class="text-emerald-500 w-8 h-8"></i></div>
            <div id="icon-unlock" class="hidden"><i data-lucide="unlock" class="text-emerald-500 w-8 h-8"></i></div>
            <h1 class="text-3xl font-black tracking-wider bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                PASSWORD
            </h1>
        </header>

        <!-- Dica / Info -->
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-3 mb-6 w-full max-w-lg flex items-start gap-3 text-sm text-slate-400">
            <i data-lucide="info" class="w-5 h-5 flex-shrink-0 text-cyan-500"></i>
            <p>
                Descubra a senha oculta. <strong class="text-emerald-400">Maiúsculas e minúsculas fazem diferença!</strong> Pode conter símbolos como @, #, *, etc.
            </p>
        </div>

        <!-- Mensagens de Feedback -->
        <div class="h-8 mb-4 w-full max-w-lg flex justify-center">
            <div id="message-box" class="hidden px-4 py-1 rounded-full text-sm font-semibold flex items-center gap-2 animate-pulse">
                <i data-lucide="alert-circle" class="w-4 h-4"></i>
                <span id="message-text"></span>
            </div>
        </div>

        <!-- Grid de Jogo com Input Invisível -->
        <div class="relative w-full max-w-lg flex flex-col gap-2 mb-8" id="grid-wrapper">
            <!-- Input escondido sobre o grid para capturar digitação -->
            <input
                id="hidden-input"
                type="text"
                class="hidden-input"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                autofocus
            />
            
            <div id="grid-container" class="flex flex-col gap-2 w-full">
                <!-- Os quadrados serão gerados aqui pelo JavaScript -->
            </div>
        </div>

        <!-- Controles -->
        <div id="controls-container" class="w-full max-w-lg flex flex-col gap-4">
            <button 
                id="btn-submit"
                class="font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2 bg-slate-800 text-slate-500 cursor-not-allowed"
                disabled
            >
                TENTAR ACESSO (Enter)
            </button>
        </div>

        <!-- Botão de Reiniciar (Escondido por padrão) -->
        <div id="restart-container" class="w-full max-w-lg flex flex-col gap-4 hidden">
            <button 
                id="btn-restart"
                class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-8 rounded-lg transition-colors flex items-center justify-center gap-2 mt-4 animate-bounce hover:animate-none"
            >
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                NOVA TENTATIVA
            </button>
        </div>

        <!-- Legenda -->
        <footer class="mt-12 text-xs text-slate-500 flex gap-4">
           <span class="flex items-center gap-1"><span class="w-3 h-3 bg-emerald-500 inline-block rounded-sm"></span> Correto</span>
           <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-500 inline-block rounded-sm"></span> Posição Errada</span>
           <span class="flex items-center gap-1"><span class="w-3 h-3 bg-slate-700 inline-block rounded-sm"></span> Não Existe</span>
        </footer>
    </div>

    <script>
        // --- BASE DE DADOS E CONFIGURAÇÕES ---
        const PASSWORD_DATABASE = [
            "CT2024#", "admin12", "S3nha@1", "P@sswrd", "qwerty1", 
            "M@trix1", "root#12", "s3cr3t0", "Xablau1", "Messi10", 
            "F12024!", "Verao25", "Natal24", "admin@1", "master1", 
            "mudar@1", "senha!2", "Goku24!", "br@sil1", "Deus#07", 
            "t3rmin4", "d4t4b4s", "h@cker1", "1234567", "Flamen9", 
            "Gremio7", "Santos!", "Brasil!"
        ];
        const MAX_GUESSES = 6;

        // --- ESTADO DO JOGO ---
        let targetPassword = '';
        let guesses = [];
        let currentGuess = '';
        let gameOver = false;
        let gameWon = false;
        let messageTimeout = null;

        // --- ELEMENTOS DO DOM ---
        const gameContainer = document.getElementById('game-container');
        const gridContainer = document.getElementById('grid-container');
        const hiddenInput = document.getElementById('hidden-input');
        const btnSubmit = document.getElementById('btn-submit');
        const btnRestart = document.getElementById('btn-restart');
        const controlsContainer = document.getElementById('controls-container');
        const restartContainer = document.getElementById('restart-container');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');
        const iconLock = document.getElementById('icon-lock');
        const iconUnlock = document.getElementById('icon-unlock');

        // --- INICIALIZAÇÃO DOS ÍCONES LUCIDE ---
        lucide.createIcons();

        // --- LÓGICA DE AVALIAÇÃO ---
        function evaluateGuess(guess, target) {
            const result = new Array(target.length).fill('gray');
            const targetChars = target.split('');
            const guessChars = guess.split('');

            // Primeira passagem: verde
            for (let i = 0; i < target.length; i++) {
                if (guessChars[i] === targetChars[i]) {
                    result[i] = 'green';
                    targetChars[i] = null;
                    guessChars[i] = null;
                }
            }

            // Segunda passagem: amarelo
            for (let i = 0; i < target.length; i++) {
                if (guessChars[i] !== null && targetChars.includes(guessChars[i])) {
                    result[i] = 'yellow';
                    targetChars[targetChars.indexOf(guessChars[i])] = null;
                }
            }

            return result;
        }

        // --- FUNÇÕES DE RENDERIZAÇÃO ---
        function getCellClasses(char, status, isActiveRow, isActiveCell) {
            let base = "flex items-center justify-center font-bold text-lg sm:text-2xl rounded-md transition-all duration-300 w-full h-10 sm:h-14 ";
            
            if (status === 'green') return base + "bg-emerald-500 border-2 border-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.5)]";
            if (status === 'yellow') return base + "bg-yellow-500 border-2 border-yellow-500 text-white shadow-[0_0_10px_rgba(234,179,8,0.5)]";
            if (status === 'gray') return base + "bg-slate-700 border-2 border-slate-600 text-slate-300 opacity-70";
            
            if (isActiveCell) return base + "bg-slate-800 border-b-4 border-slate-700 border-b-emerald-500 text-emerald-400 shadow-[0_4px_10px_rgba(52,211,153,0.15)] animate-pulse";
            
            if (isActiveRow && char) return base + "bg-slate-800 border-2 border-emerald-400 text-emerald-400 scale-105 shadow-[0_0_8px_rgba(52,211,153,0.3)]";
            
            return base + "bg-slate-800 border-2 border-slate-700 text-slate-100";
        }

        function renderGrid() {
            let html = '';
            const passLength = targetPassword.length;

            for (let i = 0; i < MAX_GUESSES; i++) {
                const isCurrentRow = i === guesses.length;
                const guess = guesses[i];
                const displayStr = guess || (isCurrentRow ? currentGuess : '');
                const evaluated = guess ? evaluateGuess(guess, targetPassword) : null;

                html += `<div class="grid gap-1.5 sm:gap-2" style="grid-template-columns: repeat(${passLength}, minmax(0, 1fr))">`;
                
                for (let j = 0; j < passLength; j++) {
                    const char = displayStr[j] || '';
                    const status = evaluated ? evaluated[j] : null;
                    const isActiveCell = isCurrentRow && j === currentGuess.length && !gameOver;
                    
                    const cellClass = getCellClasses(char, status, isCurrentRow, isActiveCell);
                    html += `<div class="${cellClass}">${char}</div>`;
                }
                
                html += `</div>`;
            }
            gridContainer.innerHTML = html;
        }

        function updateUI() {
            renderGrid();

            // Atualiza o estado do botão
            if (currentGuess.length === targetPassword.length && !gameOver) {
                btnSubmit.disabled = false;
                btnSubmit.className = "font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white active:scale-95";
            } else {
                btnSubmit.disabled = true;
                btnSubmit.className = "font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2 bg-slate-800 text-slate-500 cursor-not-allowed";
            }

            // Mostra/Esconde controles de fim de jogo
            if (gameOver) {
                hiddenInput.style.display = 'none';
                controlsContainer.classList.add('hidden');
                restartContainer.classList.remove('hidden');
            } else {
                hiddenInput.style.display = 'block';
                controlsContainer.classList.remove('hidden');
                restartContainer.classList.add('hidden');
            }

            // Atualiza ícone do cadeado
            if (gameWon) {
                iconLock.classList.add('hidden');
                iconUnlock.classList.remove('hidden');
            } else {
                iconLock.classList.remove('hidden');
                iconUnlock.classList.add('hidden');
            }
        }

        function showMessage(msg, isSuccess = false) {
            if (messageTimeout) clearTimeout(messageTimeout);
            
            messageText.textContent = msg;
            messageBox.classList.remove('hidden', 'bg-emerald-500/20', 'text-emerald-400', 'bg-red-500/20', 'text-red-400');
            
            if (isSuccess) {
                messageBox.classList.add('bg-emerald-500/20', 'text-emerald-400');
            } else {
                messageBox.classList.add('bg-red-500/20', 'text-red-400');
            }

            messageTimeout = setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 3000);
        }

        // --- LÓGICA DO JOGO ---
        function startNewGame() {
            targetPassword = PASSWORD_DATABASE[Math.floor(Math.random() * PASSWORD_DATABASE.length)];
            guesses = [];
            currentGuess = '';
            gameOver = false;
            gameWon = false;
            hiddenInput.value = '';
            messageBox.classList.add('hidden');
            
            updateUI();
            setTimeout(() => hiddenInput.focus(), 100);
        }

        function submitGuess() {
            if (gameOver) return;

            if (currentGuess.length < targetPassword.length) {
                showMessage(`A senha precisa ter ${targetPassword.length} caracteres!`);
                return;
            }

            guesses.push(currentGuess);
            
            if (currentGuess === targetPassword) {
                gameWon = true;
                gameOver = true;
                showMessage('Acesso Concedido! Você descobriu a senha.', true);
            } else if (guesses.length >= MAX_GUESSES) {
                gameOver = true;
                showMessage(`Acesso Negado! A senha era: ${targetPassword}`);
            }

            currentGuess = '';
            hiddenInput.value = '';
            updateUI();
        }

        // --- LISTENERS DE EVENTOS ---
        hiddenInput.addEventListener('input', (e) => {
            if (gameOver) return;
            const value = e.target.value.replace(/\s/g, ''); // Evita espaços
            if (value.length <= targetPassword.length) {
                currentGuess = value;
                // Força o valor do input a acompanhar o currentGuess (caso cole texto maior)
                hiddenInput.value = currentGuess; 
                updateUI();
            }
        });

        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitGuess();
            }
        });

        btnSubmit.addEventListener('click', submitGuess);
        btnRestart.addEventListener('click', startNewGame);

        // Garante que o input ganhe foco ao clicar na área do jogo
        gameContainer.addEventListener('click', () => {
            if (!gameOver) {
                hiddenInput.focus();
            }
        });

        // --- INICIAR JOGO AO CARREGAR ---
        window.onload = startNewGame;

    </script>
</body>
</html>
